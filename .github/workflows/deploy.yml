name: Deploy to Azure Functions

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-newsletter-scrapper
  AZURE_STORAGE_ACCOUNT_NAME: newsletterscrapper
  AZURE_FUNCTIONAPP_NAME: newsletter-web-scrapper
  AZURE_LOCATION: westeurope
  PYTHON_VERSION: "3.12"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt --target .python_packages/lib/site-packages

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision infrastructure
        run: |
          az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION"

          az storage account create \
            --name "$AZURE_STORAGE_ACCOUNT_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION" \
            --sku Standard_LRS \
            --allow-blob-public-access false

          if ! az functionapp show --name "$AZURE_FUNCTIONAPP_NAME" --resource-group "$AZURE_RESOURCE_GROUP" &>/dev/null; then
            az functionapp create \
              --name "$AZURE_FUNCTIONAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --storage-account "$AZURE_STORAGE_ACCOUNT_NAME" \
              --consumption-plan-location "$AZURE_LOCATION" \
              --os-type linux \
              --runtime python \
              --runtime-version "$PYTHON_VERSION" \
              --functions-version 4 \
              --assign-identity
          else
            az functionapp identity assign --name "$AZURE_FUNCTIONAPP_NAME" --resource-group "$AZURE_RESOURCE_GROUP"
            az functionapp config set \
              --name "$AZURE_FUNCTIONAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --linux-fx-version "Python|$PYTHON_VERSION"
          fi

          PRINCIPAL_ID=$(az functionapp identity show --name "$AZURE_FUNCTIONAPP_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --query principalId -o tsv)
          SA_ID=$(az storage account show --name "$AZURE_STORAGE_ACCOUNT_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --query id -o tsv)

          az role assignment create \
            --assignee "$PRINCIPAL_ID" \
            --role "Storage Table Data Contributor" \
            --scope "$SA_ID" \
            2>/dev/null || true

      - name: Set function app settings
        run: |
          az functionapp config appsettings set \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --settings \
              TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
              TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}" \
              AZURE_TABLES_ENDPOINT="https://${AZURE_STORAGE_ACCOUNT_NAME}.table.core.windows.net" \
              WEBSITE_TIME_ZONE="UTC"

      - uses: azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: .
          scm-do-build-during-deployment: true
          enable-oryx-build: true
